version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portal-backend
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
      - uploads-data:/app/uploads
    environment:
      - DATABASE_URL=sqlite:///./data/portal.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: portal-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
  uploads-data: